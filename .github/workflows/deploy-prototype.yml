name: Deploy prototype to GitHub Pages

on:
  push:
    branches: [main, prototype-review]
    paths: [prototypes/bells-bliss-n-more/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototypes/bells-bliss-n-more
      - id: deployment
        uses: actions/deploy-pages@v4
